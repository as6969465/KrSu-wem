<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrSu-wem — 全部商品</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a1a;
      --accent: #e53e3e;
      --bg: #f7f7f7;
      --card: #ffffff;
      --border: #e8e8e8;
      --muted: #888;
      --text: #1a1a1a;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }

    /* ── 公告橫幅 ── */
    .announce-bar {
      background: #1a1a1a; color: #fff;
      text-align: center; padding: .45rem 1rem;
      font-size: .78rem; letter-spacing: .02em;
    }

    /* ── Header ── */
    .header { background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
    .header-top {
      max-width: 1280px; margin: auto; padding: .75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .header-logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -.03em; color: var(--primary); }
    .header-logo span { color: var(--accent); }
    .header-search {
      flex: 1; max-width: 400px;
      display: flex; align-items: center;
      border: 1.5px solid var(--border); border-radius: 99px;
      padding: .4rem .9rem; gap: .5rem; background: #f9f9f9;
    }
    .header-search input { border: none; background: none; outline: none; font-size: .88rem; flex: 1; color: var(--text); }
    .header-search svg { width: 16px; height: 16px; color: var(--muted); flex-shrink: 0; }
    .header-actions { display: flex; align-items: center; gap: 1rem; }
    .header-actions a, .header-actions button {
      display: flex; align-items: center; gap: .35rem;
      font-size: .85rem; color: var(--muted); background: none; border: none; cursor: pointer;
      padding: .3rem .5rem; border-radius: 6px; transition: color .15s;
      white-space: nowrap;
    }
    .header-actions a:hover, .header-actions button:hover { color: var(--primary); }
    .cart-count {
      background: var(--accent); color: #fff;
      font-size: .65rem; font-weight: 700; border-radius: 99px;
      padding: 1px 5px; min-width: 16px; text-align: center;
    }
    .btn-login {
      background: var(--primary) !important; color: #fff !important;
      border-radius: 99px !important; padding: .35rem 1rem !important;
      font-weight: 600 !important;
    }
    .btn-login:hover { opacity: .85; }

    /* ── Category Nav ── */
    .cat-nav { border-top: 1px solid var(--border); }
    .cat-nav-inner {
      max-width: 1280px; margin: auto; padding: 0 1.5rem;
      display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: .7rem 1.1rem; font-size: .84rem; font-weight: 500;
      color: var(--muted); background: none; border: none; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .cat-btn:hover { color: var(--primary); }
    .cat-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ── Main Layout ── */
    .container { max-width: 1280px; margin: auto; padding: 1.5rem; }

    /* ── 公告 Banner ── */
    #banner-area { margin-bottom: 1rem; }
    .banner-msg {
      background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412;
      border-radius: var(--radius); padding: .6rem 1rem; font-size: .84rem;
      display: flex; align-items: center; gap: .5rem;
    }

    /* ── Sort Bar ── */
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; flex-wrap: wrap; gap: .75rem;
    }
    .sort-bar-left { font-size: .85rem; color: var(--muted); }
    .sort-bar-left strong { color: var(--primary); }
    .sort-bar-right { display: flex; align-items: center; gap: .75rem; }
    .sort-select {
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: .4rem .75rem; font-size: .84rem; background: #fff; cursor: pointer;
      color: var(--text); outline: none;
    }
    .sort-select:focus { border-color: var(--primary); }

    /* ── Product Grid ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    @media (max-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 640px)  { .product-grid { grid-template-columns: repeat(2, 1fr); gap: .6rem; } }

    /* ── Product Card ── */
    .product-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      cursor: pointer; transition: box-shadow .2s, transform .2s;
      display: flex; flex-direction: column;
    }
    .product-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.1); transform: translateY(-2px); }

    .product-img-wrap {
      position: relative; width: 100%; aspect-ratio: 1;
      background: #f5f5f5; overflow: hidden;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: contain;
      padding: .5rem;
      transition: transform .35s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.05); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; color: #ccc;
    }

    /* 圖片上的 badge */
    .img-badges { position: absolute; top: .5rem; left: .5rem; display: flex; flex-direction: column; gap: .3rem; }
    .img-badge {
      display: inline-block; padding: .18rem .55rem;
      border-radius: 4px; font-size: .7rem; font-weight: 700;
      letter-spacing: .02em; line-height: 1.4;
    }
    .img-badge-sale { background: var(--accent); color: #fff; }
    .img-badge-soldout { background: #555; color: #fff; }
    .img-badge-new { background: #2563eb; color: #fff; }

    /* 快速加入按鈕（hover 出現） */
    .quick-add {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(26,26,26,.88); color: #fff;
      text-align: center; padding: .6rem;
      font-size: .82rem; font-weight: 600; letter-spacing: .03em;
      transform: translateY(100%); transition: transform .22s;
    }
    .product-card:hover .quick-add { transform: translateY(0); }
    .quick-add.sold-out { background: rgba(100,100,100,.88); cursor: not-allowed; }

    .product-info { padding: .75rem; flex: 1; display: flex; flex-direction: column; gap: .3rem; }
    .product-cat { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .product-name { font-size: .9rem; font-weight: 600; line-height: 1.4; color: var(--text); }
    .product-price-row { display: flex; align-items: center; gap: .4rem; margin-top: auto; padding-top: .4rem; }
    .price-main { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .price-sale { color: var(--accent); }
    .price-orig { font-size: .8rem; color: #aaa; text-decoration: line-through; }

    /* ── Empty / Loading ── */
    .grid-msg {
      grid-column: 1 / -1; text-align: center;
      padding: 4rem 1rem; color: var(--muted);
    }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid #e2e8f0; border-top-color: var(--primary);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pagination ── */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: .4rem; margin-top: 2rem;
    }
    .page-btn {
      width: 34px; height: 34px; border-radius: 6px;
      border: 1.5px solid var(--border); background: #fff;
      font-size: .84rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; color: var(--text);
    }
    .page-btn:hover { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      padding: 1rem; opacity: 0; transition: opacity .2s;
    }
    .modal-overlay.show { opacity: 1; }
    .modal-box {
      background: #fff; border-radius: 12px; width: 100%; max-width: 680px;
      max-height: 90vh; overflow-y: auto; position: relative;
      transform: translateY(20px); transition: transform .2s;
    }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: #f3f3f3; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      color: var(--muted); z-index: 10;
    }
    .modal-close:hover { background: #e5e5e5; }

    .modal-body { display: flex; gap: 0; }
    .modal-img {
      width: 300px; flex-shrink: 0;
      background: #f5f5f5; border-radius: 12px 0 0 12px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      min-height: 300px; max-height: 480px;
    }
    .modal-img img {
      width: 100%; height: 100%; max-height: 480px;
      object-fit: contain; padding: 1rem;
    }
    .modal-img-placeholder { width: 100%; height: 100%; min-height: 300px; display: flex; align-items: center; justify-content: center; font-size: 5rem; color: #ddd; }
    .modal-info { flex: 1; padding: 2rem 1.75rem; display: flex; flex-direction: column; gap: 1rem; }
    .modal-cat { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .modal-name { font-size: 1.25rem; font-weight: 700; line-height: 1.4; }
    .modal-price { font-size: 1.4rem; font-weight: 800; }
    .modal-price.has-sale { color: var(--accent); }
    .modal-price-orig { font-size: .9rem; color: #aaa; text-decoration: line-through; margin-left: .5rem; font-weight: 400; }
    .modal-desc { font-size: .875rem; color: #555; line-height: 1.7; flex: 1; }
    .modal-stock { font-size: .8rem; color: var(--muted); }
    .qty-row { display: flex; align-items: center; gap: .6rem; }
    .qty-btn { width: 32px; height: 32px; border-radius: 6px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: border-color .15s; }
    .qty-btn:hover { border-color: var(--primary); }
    .qty-input { width: 52px; text-align: center; border: 1.5px solid var(--border); border-radius: 6px; padding: .3rem; font-size: .9rem; }
    .btn-cart {
      background: var(--primary); color: #fff; border: none;
      border-radius: 8px; padding: .75rem 1.5rem; font-size: .92rem; font-weight: 700;
      cursor: pointer; width: 100%; transition: opacity .15s; letter-spacing: .02em;
    }
    .btn-cart:hover { opacity: .85; }
    .btn-cart:disabled { background: #ccc; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: #1a1a1a; color: #fff; padding: .65rem 1.4rem;
      border-radius: 99px; font-size: .85rem; font-weight: 500;
      z-index: 999; box-shadow: 0 4px 20px rgba(0,0,0,.2);
      animation: toastIn .25s ease;
    }
    @keyframes toastIn { from { opacity:0; transform: translate(-50%, 10px); } to { opacity:1; transform: translate(-50%, 0); } }

    @media (max-width: 640px) {
      .modal-body { flex-direction: column; }
      .modal-img { width: 100%; height: 220px; border-radius: 12px 12px 0 0; }
      .header-top { padding: .65rem 1rem; }
      .header-logo { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<!-- 公告橫幅 -->
<div class="announce-bar" id="announce-bar" style="display:none"></div>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <a href="shop.html" class="header-logo" id="store-logo">KrSu<span>-wem</span></a>

    <div class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="text" placeholder="搜尋商品..." oninput="filterProducts()">
    </div>

    <div class="header-actions">
      <a href="cart.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        購物車 <span class="cart-count" id="cart-count">0</span>
      </a>
      <a href="member.html" id="nav-member" style="display:none">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        會員
      </a>
      <button onclick="doLogout()" id="nav-logout" style="display:none">登出</button>
      <a href="index.html" id="nav-login" class="btn-login">登入 / 註冊</a>
    </div>
  </div>

  <!-- 分類導覽 -->
  <nav class="cat-nav">
    <div class="cat-nav-inner" id="cat-nav">
      <button class="cat-btn active" data-cat="" onclick="setCategory('')">全部商品</button>
    </div>
  </nav>
</header>

<!-- 主內容 -->
<div class="container">
  <!-- 公告 -->
  <div id="banner-area"></div>

  <!-- 排序列 -->
  <div class="sort-bar">
    <div class="sort-bar-left">共 <strong id="product-count">0</strong> 件商品</div>
    <div class="sort-bar-right">
      <select class="sort-select" onchange="sortProducts(this.value)">
        <option value="">預設排序</option>
        <option value="price-asc">價格：低 → 高</option>
        <option value="price-desc">價格：高 → 低</option>
        <option value="name">名稱 A-Z</option>
      </select>
      <select class="sort-select" onchange="setPageSize(+this.value)">
        <option value="24">24 件 / 頁</option>
        <option value="48">48 件 / 頁</option>
        <option value="96">96 件 / 頁</option>
      </select>
    </div>
  </div>

  <!-- 商品格 -->
  <div class="product-grid" id="product-grid">
    <div class="grid-msg"><div class="spinner"></div><p style="margin-top:1rem">載入商品中...</p></div>
  </div>

  <!-- 分頁 -->
  <div class="pagination" id="pagination"></div>
</div>

<!-- 商品詳情 Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cart.js"></script>
<script>
let allProducts = [];
let filteredProducts = [];
let currentCategory = '';
let currentPage = 1;
let pageSize = 24;

// ── Auth 狀態 ─────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('nav-member').style.display = 'flex';
    document.getElementById('nav-logout').style.display = '';
    document.getElementById('nav-login').style.display = 'none';
  } else {
    document.getElementById('nav-member').style.display = 'none';
    document.getElementById('nav-logout').style.display = 'none';
    document.getElementById('nav-login').style.display = '';
  }
  loadCartCount();
  loadStoreName();
  loadBanners();
  loadProducts();
});

// ── 賣場名稱 ─────────────────────────────────────────────
async function loadStoreName() {
  try {
    const snap = await db.collection('settings').doc('general').get();
    const name = snap.exists ? snap.data().storeName : '';
    if (name) {
      document.getElementById('store-logo').textContent = name;
      document.title = name + ' — 全部商品';
    }
  } catch(e) {}
}

// ── 公告橫幅 ─────────────────────────────────────────────
async function loadBanners() {
  try {
    const snap = await db.collection('settings').doc('banners').get();
    const items = snap.exists ? (snap.data().items || []) : [];
    if (!items.length) return;
    document.getElementById('announce-bar').textContent = items.map(b => b.text).join('  ·  ');
    document.getElementById('announce-bar').style.display = 'block';
    const area = document.getElementById('banner-area');
    area.innerHTML = '';
  } catch(e) {}
}

// ── 載入商品 ─────────────────────────────────────────────
async function loadProducts() {
  try {
    const snap = await db.collection('products').where('active', '==', true).get();
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));

    // 建立分類按鈕
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const nav = document.getElementById('cat-nav');
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.dataset.cat = c;
      btn.textContent = c;
      btn.onclick = () => setCategory(c);
      nav.appendChild(btn);
    });

    filteredProducts = [...allProducts];
    renderProducts();
  } catch(e) {
    document.getElementById('product-grid').innerHTML = `<div class="grid-msg">載入失敗：${escapeHtml(e.message)}</div>`;
  }
}

// ── 分類 ─────────────────────────────────────────────────
function setCategory(cat) {
  currentCategory = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.cat === cat);
  });
  filterProducts();
}

// ── 搜尋 + 篩選 ──────────────────────────────────────────
function filterProducts() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  filteredProducts = allProducts.filter(p => {
    const matchCat = !currentCategory || p.category === currentCategory;
    const matchQ   = !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  currentPage = 1;
  renderProducts();
}

// ── 排序 ─────────────────────────────────────────────────
function sortProducts(val) {
  if (val === 'price-asc')  filteredProducts.sort((a,b) => getPrice(a) - getPrice(b));
  else if (val === 'price-desc') filteredProducts.sort((a,b) => getPrice(b) - getPrice(a));
  else if (val === 'name')  filteredProducts.sort((a,b) => a.name.localeCompare(b.name));
  else filteredProducts.sort((a,b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
  currentPage = 1;
  renderProducts();
}

function setPageSize(n) { pageSize = n; currentPage = 1; renderProducts(); }
function getPrice(p) { return p.salePrice ?? p.price ?? 0; }

// ── 渲染商品 ─────────────────────────────────────────────
function renderProducts() {
  document.getElementById('product-count').textContent = filteredProducts.length;
  const grid = document.getElementById('product-grid');

  if (!filteredProducts.length) {
    grid.innerHTML = '<div class="grid-msg">找不到符合的商品</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const start = (currentPage - 1) * pageSize;
  const page  = filteredProducts.slice(start, start + pageSize);

  grid.innerHTML = page.map(p => {
    const price   = getPrice(p);
    const hasSale = p.salePrice && p.salePrice < p.price;
    const soldOut = (p.stock ?? 999) <= 0;
    const hasImg  = !!p.imageUrl;
    const isNew   = p.createdAt && (Date.now()/1000 - p.createdAt.seconds < 86400 * 14);

    return `
    <div class="product-card" data-id="${escapeHtml(p.id)}" onclick="openProduct(this.dataset.id)">
      <div class="product-img-wrap">
        ${hasImg
          ? `<img data-pid="${escapeHtml(p.id)}" alt="${escapeHtml(p.name)}" loading="lazy">`
          : `<div class="product-img-placeholder">🛍️</div>`}
        <div class="img-badges">
          ${soldOut ? '<span class="img-badge img-badge-soldout">售完</span>' : ''}
          ${hasSale && !soldOut ? '<span class="img-badge img-badge-sale">特價</span>' : ''}
          ${isNew && !soldOut ? '<span class="img-badge img-badge-new">NEW</span>' : ''}
        </div>
        <div class="quick-add ${soldOut ? 'sold-out' : ''}">${soldOut ? '已售完' : '加入購物車'}</div>
      </div>
      <div class="product-info">
        ${p.category ? `<div class="product-cat">${escapeHtml(p.category)}</div>` : ''}
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="product-price-row">
          <span class="price-main ${hasSale ? 'price-sale' : ''}">NT$ ${Number(price).toLocaleString()}</span>
          ${hasSale ? `<span class="price-orig">NT$ ${Number(p.price).toLocaleString()}</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  // 用 JS 設定 src（避免 base64 長字串在 innerHTML 屬性中被截斷）
  grid.querySelectorAll('img[data-pid]').forEach(img => {
    const p = allProducts.find(x => x.id === img.dataset.pid);
    if (p && p.imageUrl) img.src = p.imageUrl;
  });

  renderPagination();
}

// ── 分頁 ─────────────────────────────────────────────────
function renderPagination() {
  const total = Math.ceil(filteredProducts.length / pageSize);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    if (total > 7 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== total) {
      if (i === currentPage - 3 || i === currentPage + 3) html += `<span style="padding:0 .25rem;color:var(--muted)">…</span>`;
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

function goPage(n) {
  const total = Math.ceil(filteredProducts.length / pageSize);
  if (n < 1 || n > total) return;
  currentPage = n;
  renderProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 商品詳情 Modal ────────────────────────────────────────
function openProduct(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const price   = getPrice(p);
  const hasSale = p.salePrice && p.salePrice < p.price;
  const soldOut = (p.stock ?? 999) <= 0;
  const imgSrc  = safeImgSrc(p.imageUrl);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-img">
      ${p.imageUrl
        ? `<img id="modal-img-el" alt="${escapeHtml(p.name)}">`
        : `<div class="modal-img-placeholder">🛍️</div>`}
    </div>
    <div class="modal-info">
      ${p.category ? `<div class="modal-cat">${escapeHtml(p.category)}</div>` : ''}
      <div class="modal-name">${escapeHtml(p.name)}</div>
      <div>
        <span class="modal-price ${hasSale ? 'has-sale' : ''}">
          NT$ ${Number(price).toLocaleString()}
          ${hasSale ? `<span class="modal-price-orig">NT$ ${Number(p.price).toLocaleString()}</span>` : ''}
        </span>
      </div>
      <div class="modal-desc">${escapeHtml(p.description || '暫無商品說明')}</div>
      <div class="modal-stock">${soldOut ? '❌ 已售完' : `庫存：${escapeHtml(String(p.stock ?? '充足'))}`}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="changeQty(-1)">－</button>
        <input class="qty-input" id="modal-qty" type="number" value="1" min="1" max="${Number(p.stock)||999}">
        <button class="qty-btn" onclick="changeQty(1)">＋</button>
      </div>
      <button class="btn-cart" id="btn-add-cart" ${soldOut ? 'disabled' : ''}>
        ${soldOut ? '已售完' : '加入購物車'}
      </button>
    </div>`;

  // 用 JS 設定圖片 src，避免 base64 在 innerHTML 被截斷
  if (p.imageUrl) {
    const modalImg = document.getElementById('modal-img-el');
    if (modalImg) modalImg.src = p.imageUrl;
  }

  }
  const overlay = document.getElementById('product-modal');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => overlay.classList.add('show'));
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const overlay = document.getElementById('product-modal');
  overlay.classList.remove('show');
  setTimeout(() => { overlay.style.display = 'none'; }, 200);
  document.body.style.overflow = '';
}

// 點 overlay 背景關閉
document.getElementById('product-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function changeQty(d) {
  const input = document.getElementById('modal-qty');
  input.value = Math.max(1, parseInt(input.value || 1) + d);
}

function addToCartFromModal(id) {
  const p = allProducts.find(x => x.id === id);
  const qty = parseInt(document.getElementById('modal-qty').value) || 1;
  addToCart(p, qty);
  closeModal();
  loadCartCount();
  showToast('已加入購物車 ✓');
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
