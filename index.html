<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrSu-wem 電商平台 — 登入 / 註冊</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>🛒 <span class="store-name-el">KrSu-wem</span></h1>
      <p>您的線上購物首選平台</p>
    </div>

    <!-- Tabs: 登入 / 註冊 -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">註冊</button>
    </div>

    <div id="alert-box"></div>

    <!-- 登入表單 -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">電子信箱</label>
        <input id="login-email" type="email" class="form-input" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">密碼</label>
        <input id="login-password" type="password" class="form-input" placeholder="請輸入密碼">
      </div>
      <button class="btn btn-primary btn-full" onclick="loginWithEmail()" id="btn-login">登入</button>

      <div class="divider">或</div>

      <button class="btn btn-outline btn-full" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        使用 Google 帳號登入
      </button>

      <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--muted)">
        <a href="#" onclick="showPhoneLogin()" style="color:var(--primary)">使用手機號碼登入</a>
      </p>

      <div class="divider"></div>
      <p style="text-align:center;font-size:.85rem;color:var(--muted)">
        賣家後台？ <a href="admin/index.html" style="color:var(--primary);font-weight:600">前往管理後台</a>
      </p>
    </div>

    <!-- 註冊表單 -->
    <div id="form-register" style="display:none">
      <div id="reg-step1">
        <div class="form-group">
          <label class="form-label">註冊方式</label>
          <div style="display:flex;gap:.75rem;">
            <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.9rem;">
              <input type="radio" name="reg-method" value="email" checked onchange="setRegMethod('email')"> 電子信箱
            </label>
            <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.9rem;">
              <input type="radio" name="reg-method" value="phone" onchange="setRegMethod('phone')"> 手機號碼
            </label>
          </div>
        </div>
        <div id="reg-email-fields">
          <div class="form-group">
            <label class="form-label">電子信箱</label>
            <input id="reg-email" type="email" class="form-input" placeholder="example@email.com">
          </div>
          <div class="form-group">
            <label class="form-label">密碼</label>
            <input id="reg-password" type="password" class="form-input" placeholder="至少 6 個字元">
          </div>
          <div class="form-group">
            <label class="form-label">確認密碼</label>
            <input id="reg-password2" type="password" class="form-input" placeholder="再次輸入密碼">
          </div>
        </div>
        <div id="reg-phone-fields" style="display:none">
          <div class="form-group">
            <label class="form-label">手機號碼</label>
            <input id="reg-phone" type="tel" class="form-input" placeholder="+886 912 345 678">
            <span class="form-hint">請輸入含國碼的手機號碼，例如 +886912345678</span>
          </div>
          <div id="reg-recaptcha-container"></div>
        </div>
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input id="reg-name" type="text" class="form-input" placeholder="您的姓名">
        </div>
        <button class="btn btn-primary btn-full" onclick="doRegister()" id="btn-register">建立帳號</button>
      </div>

      <!-- 手機驗證碼步驟 -->
      <div id="reg-step2" style="display:none">
        <p style="margin-bottom:1rem;font-size:.9rem;color:var(--muted)">驗證碼已傳送至您的手機</p>
        <div class="form-group">
          <label class="form-label">驗證碼</label>
          <input id="reg-otp" type="text" class="form-input" placeholder="輸入 6 位數驗證碼" maxlength="6">
        </div>
        <button class="btn btn-primary btn-full" onclick="verifyOTP()">驗證並完成註冊</button>
      </div>
    </div>

    <!-- 手機登入 -->
    <div id="form-phone" style="display:none">
      <div id="phone-step1">
        <div class="form-group">
          <label class="form-label">手機號碼</label>
          <input id="phone-number" type="tel" class="form-input" placeholder="+886 912 345 678">
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn btn-primary btn-full" onclick="sendPhoneCode()" style="margin-top:.5rem">發送驗證碼</button>
        <button class="btn btn-outline btn-full" onclick="switchTab('login')" style="margin-top:.5rem">返回</button>
      </div>
      <div id="phone-step2" style="display:none">
        <div class="form-group">
          <label class="form-label">驗證碼</label>
          <input id="phone-otp" type="text" class="form-input" placeholder="輸入 6 位數驗證碼" maxlength="6">
        </div>
        <button class="btn btn-primary btn-full" onclick="verifyPhoneOTP()">驗證登入</button>
      </div>
    </div>

  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
let confirmationResult = null;
let regMethod = 'email';
let recaptchaVerifier = null;

// 檢查已登入狀態
auth.onAuthStateChanged(user => {
  applyStoreName(' — 登入');
  if (user) {
    db.collection('admins').doc(user.uid).get()
      .then(doc => {
        window.location.href = doc.exists ? 'admin/index.html' : 'shop.html';
      })
      .catch(() => {
        window.location.href = 'shop.html';
      });
  }
});

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('form-phone').style.display = 'none';
  document.getElementById('tab-login').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-register').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
  clearAlert();
}

function showPhoneLogin() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-phone').style.display = 'block';
  initRecaptcha('recaptcha-container');
}

function setRegMethod(method) {
  regMethod = method;
  document.getElementById('reg-email-fields').style.display = method === 'email' ? 'block' : 'none';
  document.getElementById('reg-phone-fields').style.display = method === 'phone' ? 'block' : 'none';
}

function showAlert(msg, type = 'error') {
  document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
function clearAlert() {
  document.getElementById('alert-box').innerHTML = '';
}

async function loginWithEmail() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAlert('請填寫信箱和密碼');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = '登入中...';
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (e) {
    showAlert(getErrorMsg(e));
    btn.disabled = false; btn.textContent = '登入';
  }
}

async function loginWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    const result = await auth.signInWithPopup(provider);
    await ensureUserDoc(result.user);
  } catch (e) {
    showAlert(getErrorMsg(e));
  }
}

function initRecaptcha(containerId) {
  if (recaptchaVerifier) {
    try { recaptchaVerifier.clear(); } catch(e) {}
    recaptchaVerifier = null;
  }
  recaptchaVerifier = new firebase.auth.RecaptchaVerifier(containerId, {
    size: 'normal',
    callback: () => {}
  });
  recaptchaVerifier.render();
}

async function sendPhoneCode() {
  const phone = document.getElementById('phone-number').value.trim();
  if (!phone) return showAlert('請輸入手機號碼');
  try {
    confirmationResult = await auth.signInWithPhoneNumber(phone, recaptchaVerifier);
    document.getElementById('phone-step1').style.display = 'none';
    document.getElementById('phone-step2').style.display = 'block';
    showAlert('驗證碼已發送', 'success');
  } catch (e) {
    showAlert(getErrorMsg(e));
  }
}

async function verifyPhoneOTP() {
  const code = document.getElementById('phone-otp').value.trim();
  if (!code) return showAlert('請輸入驗證碼');
  try {
    const result = await confirmationResult.confirm(code);
    await ensureUserDoc(result.user);
  } catch (e) {
    showAlert(getErrorMsg(e));
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  if (!name) return showAlert('請輸入姓名');

  if (regMethod === 'email') {
    const email = document.getElementById('reg-email').value.trim();
    const pw = document.getElementById('reg-password').value;
    const pw2 = document.getElementById('reg-password2').value;
    if (!email) return showAlert('請填寫信箱');
    if (pw.length < 6) return showAlert('密碼至少 6 個字元');
    if (pw !== pw2) return showAlert('兩次密碼不一致');
  } else {
    const phone = document.getElementById('reg-phone').value.trim();
    if (!phone) return showAlert('請輸入手機號碼');
  }

  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = '處理中...';

  try {
    if (regMethod === 'email') {
      const email = document.getElementById('reg-email').value.trim();
      const pw = document.getElementById('reg-password').value;
      const result = await auth.createUserWithEmailAndPassword(email, pw);
      await result.user.updateProfile({ displayName: name });
      await ensureUserDoc(result.user, name);
    } else {
      const phone = document.getElementById('reg-phone').value.trim();
      initRecaptcha('reg-recaptcha-container');
      confirmationResult = await auth.signInWithPhoneNumber(phone, recaptchaVerifier);
      document.getElementById('reg-step1').style.display = 'none';
      document.getElementById('reg-step2').style.display = 'block';
      showAlert('驗證碼已傳送', 'success');
      btn.disabled = false; btn.textContent = '建立帳號';
    }
  } catch (e) {
    showAlert(getErrorMsg(e));
    btn.disabled = false; btn.textContent = '建立帳號';
  }
}

async function verifyOTP() {
  const code = document.getElementById('reg-otp').value.trim();
  if (!code) return showAlert('請輸入驗證碼');
  try {
    const result = await confirmationResult.confirm(code);
    const name = document.getElementById('reg-name').value.trim();
    await ensureUserDoc(result.user, name);
  } catch (e) {
    showAlert(getErrorMsg(e));
  }
}

async function ensureUserDoc(user, name) {
  const ref = db.collection('users').doc(user.uid);
  const doc = await ref.get();
  if (!doc.exists) {
    await ref.set({
      name: name || user.displayName || '會員',
      email: user.email || '',
      phone: user.phoneNumber || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      addresses: []
    });
  }
}

function getErrorMsg(e) {
  const map = {
    'auth/user-not-found': '帳號不存在',
    'auth/wrong-password': '密碼錯誤',
    'auth/email-already-in-use': '此信箱已被使用',
    'auth/invalid-email': '信箱格式不正確',
    'auth/weak-password': '密碼強度不足',
    'auth/too-many-requests': '操作次數過多，請稍後再試',
    'auth/invalid-phone-number': '手機號碼格式不正確',
    'auth/invalid-verification-code': '驗證碼錯誤',
    'auth/popup-closed-by-user': '視窗已關閉，請重新操作',
    'auth/cancelled-popup-request': '操作已取消，請重試',
    'auth/missing-phone-number': '請輸入手機號碼',
    'auth/quota-exceeded': '簡訊發送次數已達上限，請稍後再試',
  };
  return map[e.code] || e.message;
}
</script>
</body>
</html>
