<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrSu-wem — 訂單管理</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{display:flex;min-height:100vh}
    .sidebar{width:220px;background:#1e293b;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
    .sidebar-brand{padding:1.25rem 1rem;font-size:1.1rem;font-weight:800;border-bottom:1px solid #334155}
    .sidebar-nav{display:flex;flex-direction:column;gap:.25rem;padding:.75rem;flex:1}
    .sidebar-link{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;color:#94a3b8;font-size:.9rem;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;text-decoration:none;transition:all .2s}
    .sidebar-link:hover,.sidebar-link.active{background:#334155;color:#fff}
    .sidebar-footer{padding:1rem;border-top:1px solid #334155}
    .main{flex:1;overflow-y:auto;background:var(--bg)}
    .main-header{background:#fff;border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">🛒 KrSu-wem<br><span style="font-size:.75rem;font-weight:400;color:#94a3b8">管理後台</span></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link">📊 總覽儀表板</a>
    <a href="products.html" class="sidebar-link">📦 商品管理</a>
    <a href="orders.html" class="sidebar-link active">📋 訂單管理</a>
    <a href="promotions.html" class="sidebar-link">🎁 優惠設定</a>
    <a href="shipping.html" class="sidebar-link">🚚 取貨設定</a>
    <a href="settings.html" class="sidebar-link">⚙️ 系統設定</a>
  </nav>
  <div class="sidebar-footer"><button class="sidebar-link" onclick="doLogout()" style="width:100%">🚪 登出</button></div>
</aside>

<div class="main">
  <div class="main-header">
    <h1 style="font-size:1.1rem;font-weight:700">訂單管理</h1>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap">
      <input id="search" type="text" class="form-input" placeholder="搜尋訂單編號/收件人..." style="width:200px" oninput="renderTable()">
      <select id="filter-status" class="form-select" style="width:auto" onchange="renderTable()">
        <option value="">所有狀態</option>
        <option value="pending">待處理</option>
        <option value="processing">備貨中</option>
        <option value="shipped">已出貨</option>
        <option value="completed">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
    </div>
  </div>
  <div style="padding:1.5rem">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>訂單編號</th>
              <th>收件人</th>
              <th>取貨方式</th>
              <th>付款</th>
              <th>金額</th>
              <th>狀態</th>
              <th>時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="order-tbody"><tr><td colspan="8" style="text-align:center"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 訂單詳情 Modal -->
<div class="modal-overlay" id="order-modal" style="display:none">
  <div class="modal-box" style="max-width:680px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 class="modal-title" id="modal-order-id">訂單詳情</h3>
    <div id="order-detail"></div>
    <div style="margin-top:1.25rem">
      <label class="form-label">更新訂單狀態</label>
      <div style="display:flex;gap:.75rem;margin-top:.5rem;flex-wrap:wrap">
        <button class="btn btn-sm btn-outline" onclick="updateStatus('pending')">待處理</button>
        <button class="btn btn-sm" style="background:#dbeafe;color:#1d4ed8;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.8rem;font-weight:600;cursor:pointer" onclick="updateStatus('processing')">備貨中</button>
        <button class="btn btn-sm" style="background:#e0f2fe;color:#0369a1;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.8rem;font-weight:600;cursor:pointer" onclick="updateStatus('shipped')">已出貨</button>
        <button class="btn btn-sm" style="background:#dcfce7;color:#15803d;border:none;border-radius:8px;padding:.35rem .8rem;font-size:.8rem;font-weight:600;cursor:pointer" onclick="updateStatus('completed')">已完成</button>
        <button class="btn btn-sm btn-danger" style="font-size:.8rem;padding:.35rem .8rem" onclick="updateStatus('cancelled')">取消訂單</button>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
const STATUS_BADGE = { pending:'badge-warn', processing:'badge-info', shipped:'badge-info', completed:'badge-success', cancelled:'badge-danger' };
const STATUS_LABEL = { pending:'待處理', processing:'備貨中', shipped:'已出貨', completed:'已完成', cancelled:'已取消' };
const PAY_LABEL = { cod:'貨到付款', transfer:'銀行轉帳', credit:'信用卡' };

let orders = [];
let currentOrderId = null;

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const doc = await db.collection('admins').doc(user.uid).get();
  if (!doc.exists) return window.location.href = '../shop.html';
  loadOrders();
});

async function loadOrders() {
  const snap = await db.collection('orders').get();
  orders = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const st = document.getElementById('filter-status').value;
  const filtered = orders.filter(o => {
    if (st && o.status !== st) return false;
    if (q && !o.id.toLowerCase().includes(q) && !(o.receiver?.name||'').toLowerCase().includes(q)) return false;
    return true;
  });
  const tbody = document.getElementById('order-tbody');
  tbody.innerHTML = filtered.length ? filtered.map(o => `
    <tr>
      <td style="font-family:monospace;font-size:.85rem">#${escapeHtml(o.id.slice(0,8).toUpperCase())}</td>
      <td>
        <div style="font-weight:600">${escapeHtml(o.receiver?.name||'—')}</div>
        <div style="font-size:.78rem;color:var(--muted)">${escapeHtml(o.receiver?.phone||'')}</div>
      </td>
      <td style="font-size:.85rem">${escapeHtml(o.shipping?.method||'—')}</td>
      <td style="font-size:.85rem">${escapeHtml(PAY_LABEL[o.payment?.method]||o.payment?.method||'—')}</td>
      <td style="font-weight:700">${formatPrice(o.total)}</td>
      <td><span class="badge ${STATUS_BADGE[o.status]||'badge-gray'}">${STATUS_LABEL[o.status]||escapeHtml(o.status)}</span></td>
      <td style="font-size:.78rem;color:var(--muted);white-space:nowrap">${formatDate(o.createdAt)}</td>
      <td><button class="btn btn-outline btn-sm" data-oid="${escapeHtml(o.id)}" onclick="openOrder(this.dataset.oid)">查看</button></td>
    </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--muted)">找不到訂單</td></tr>';
}

function openOrder(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  currentOrderId = id;
  document.getElementById('modal-order-id').textContent = `訂單 #${id.slice(0,8).toUpperCase()}`;
  document.getElementById('order-detail').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
      <div>
        <div class="form-label">收件人</div>
        <div>${escapeHtml(o.receiver?.name||'')} / ${escapeHtml(o.receiver?.phone||'')}</div>
        <div style="font-size:.85rem;color:var(--muted)">${escapeHtml(o.receiver?.email||'')}</div>
      </div>
      <div>
        <div class="form-label">取貨方式</div>
        <div>${escapeHtml(o.shipping?.method||'—')}</div>
        <div style="font-size:.85rem;color:var(--muted)">${escapeHtml(o.shipping?.address||'')}</div>
      </div>
      <div>
        <div class="form-label">付款方式</div>
        <div>${escapeHtml(PAY_LABEL[o.payment?.method]||o.payment?.method||'—')}</div>
      </div>
      <div>
        <div class="form-label">目前狀態</div>
        <span class="badge ${STATUS_BADGE[o.status]||'badge-gray'}">${STATUS_LABEL[o.status]||escapeHtml(o.status)}</span>
      </div>
    </div>
    ${o.note ? `<div class="alert alert-info" style="margin-bottom:1rem">備註：${escapeHtml(o.note)}</div>` : ''}
    <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem">
      <table style="width:100%">
        <thead><tr><th>商品</th><th>數量</th><th>小計</th></tr></thead>
        <tbody>
          ${(o.items||[]).map(i=>`<tr><td>${escapeHtml(i.name)}</td><td>×${Number(i.qty)}</td><td>${formatPrice(i.price*i.qty)}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="summary-box">
      <div class="summary-row"><span>商品小計</span><span>${formatPrice(o.subtotal)}</span></div>
      <div class="summary-row"><span>運費</span><span>${formatPrice(o.shipping?.fee||0)}</span></div>
      ${o.coupon ? `<div class="summary-row"><span>折扣（${escapeHtml(o.coupon.code)}）</span><span style="color:var(--success)">-${formatPrice(o.coupon.discount)}</span></div>` : ''}
      <div class="summary-row total"><span>合計</span><span>${formatPrice(o.total)}</span></div>
    </div>`;
  document.getElementById('order-modal').style.display = 'flex';
}

async function updateStatus(status) {
  if (!currentOrderId) return;
  if (status === 'cancelled' && !confirm('確定要取消此訂單？')) return;
  await db.collection('orders').doc(currentOrderId).update({ status, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  const idx = orders.findIndex(o=>o.id===currentOrderId);
  if (idx>-1) orders[idx].status = status;
  renderTable();
  closeModal();
}

function closeModal() { document.getElementById('order-modal').style.display = 'none'; }
function doLogout() { auth.signOut().then(() => window.location.href = '../index.html'); }
</script>
</body>
</html>
