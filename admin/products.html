<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrSu-wem — 商品管理</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{display:flex;min-height:100vh}
    .sidebar{width:220px;background:#1e293b;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
    .sidebar-brand{padding:1.25rem 1rem;font-size:1.1rem;font-weight:800;border-bottom:1px solid #334155}
    .sidebar-nav{display:flex;flex-direction:column;gap:.25rem;padding:.75rem;flex:1}
    .sidebar-link{display:flex;align-items:center;gap:.6rem;padding:.6rem .75rem;border-radius:8px;color:#94a3b8;font-size:.9rem;font-weight:500;cursor:pointer;border:none;background:none;text-align:left;text-decoration:none;transition:all .2s}
    .sidebar-link:hover,.sidebar-link.active{background:#334155;color:#fff}
    .sidebar-footer{padding:1rem;border-top:1px solid #334155}
    .main{flex:1;overflow-y:auto;background:var(--bg)}
    .main-header{background:#fff;border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
  </style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">🛒 KrSu-wem<br><span style="font-size:.75rem;font-weight:400;color:#94a3b8">管理後台</span></div>
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link">📊 總覽儀表板</a>
    <a href="products.html" class="sidebar-link active">📦 商品管理</a>
    <a href="orders.html" class="sidebar-link">📋 訂單管理</a>
    <a href="promotions.html" class="sidebar-link">🎁 優惠設定</a>
    <a href="shipping.html" class="sidebar-link">🚚 取貨設定</a>
    <a href="settings.html" class="sidebar-link">⚙️ 系統設定</a>
  </nav>
  <div class="sidebar-footer"><button class="sidebar-link" onclick="doLogout()" style="width:100%">🚪 登出</button></div>
</aside>

<div class="main">
  <div class="main-header">
    <h1 style="font-size:1.1rem;font-weight:700">商品管理</h1>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-outline btn-sm" onclick="openCatModal()">🏷️ 管理分類</button>
      <button class="btn btn-primary btn-sm" onclick="openModal()">＋ 新增商品</button>
    </div>
  </div>
  <div style="padding:1.5rem">
    <!-- 篩選列 -->
    <div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap">
      <input id="search" type="text" class="form-input" placeholder="搜尋商品名稱..." style="max-width:240px" oninput="renderTable()">
      <select id="filter-cat" class="form-select" style="width:auto" onchange="renderTable()">
        <option value="">所有分類</option>
      </select>
      <select id="filter-status" class="form-select" style="width:auto" onchange="renderTable()">
        <option value="">所有狀態</option>
        <option value="active">上架中</option>
        <option value="inactive">已下架</option>
      </select>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>商品名稱</th><th>分類</th><th>售價</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="product-tbody"><tr><td colspan="6" style="text-align:center"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 新增/編輯 Modal -->
<div class="modal-overlay" id="product-modal" style="display:none">
  <div class="modal-box" style="max-width:600px">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 class="modal-title" id="modal-title">新增商品</h3>
    <div id="modal-alert"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">商品名稱 *</label>
        <input id="p-name" type="text" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">分類</label>
        <select id="p-cat" class="form-select">
          <option value="">— 請選擇分類 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">狀態</label>
        <select id="p-active" class="form-select">
          <option value="true">上架中</option>
          <option value="false">下架</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">原價 (NT$) *</label>
        <input id="p-price" type="number" class="form-input" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">特價 (NT$，留空=不特價)</label>
        <input id="p-sale" type="number" class="form-input" min="0" placeholder="選填">
      </div>
      <div class="form-group">
        <label class="form-label">庫存數量 *</label>
        <input id="p-stock" type="number" class="form-input" min="0">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">商品圖片</label>
        <!-- 上傳區 -->
        <div id="upload-zone" onclick="document.getElementById('p-img-file').click()"
          style="border:2px dashed var(--border);border-radius:10px;padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s;background:#fafafa;position:relative">
          <div id="upload-placeholder">
            <div style="font-size:2rem;margin-bottom:.4rem">🖼️</div>
            <div style="font-size:.9rem;color:var(--muted)">點擊上傳圖片，自動壓縮至 300KB 以內</div>
            <div style="font-size:.78rem;color:#94a3b8;margin-top:.25rem">支援 JPG、PNG、WebP</div>
          </div>
          <img id="img-preview" style="display:none;max-height:160px;margin:auto;border-radius:8px;object-fit:contain">
          <div id="upload-progress" style="display:none;margin-top:.5rem">
            <div class="spinner" style="margin:auto"></div>
            <div id="upload-status" style="font-size:.82rem;color:var(--muted);margin-top:.5rem">壓縮中...</div>
          </div>
        </div>
        <input id="p-img-file" type="file" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
        <div style="display:flex;align-items:center;gap:.5rem;margin-top:.5rem">
          <span style="font-size:.8rem;color:var(--muted)">或貼上圖片網址：</span>
          <input id="p-img" type="text" class="form-input" placeholder="https://..." style="flex:1;font-size:.85rem" oninput="previewUrl(this.value)">
        </div>
        <div id="img-size-info" style="font-size:.78rem;color:var(--success);margin-top:.3rem;display:none"></div>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">商品說明</label>
        <textarea id="p-desc" class="form-textarea"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:.75rem;margin-top.5rem">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveProduct()" id="btn-save">儲存商品</button>
    </div>
  </div>
</div>

<!-- 分類管理 Modal -->
<div class="modal-overlay" id="cat-modal" style="display:none">
  <div class="modal-box" style="max-width:420px">
    <button class="modal-close" onclick="closeCatModal()">✕</button>
    <h3 class="modal-title">管理商品分類</h3>
    <div style="display:flex;gap:.5rem;margin-bottom:1rem">
      <input id="new-cat-input" type="text" class="form-input" placeholder="輸入新分類名稱" style="flex:1"
        onkeydown="if(event.key==='Enter')addCategory()">
      <button class="btn btn-primary btn-sm" onclick="addCategory()">新增</button>
    </div>
    <div id="cat-list-area" style="display:flex;flex-direction:column;gap:.4rem;max-height:320px;overflow-y:auto"></div>
    <p style="font-size:.78rem;color:var(--muted);margin-top:1rem">分類刪除後，已設定的商品不受影響</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
let products = [];
let editId = null;
let categories = []; // 從 Firestore 載入的分類清單

// ── 分類：載入 ────────────────────────────────────────────
async function loadCategories() {
  try {
    const snap = await db.collection('settings').doc('categories').get();
    categories = snap.exists ? (snap.data().items || []) : [];
  } catch(e) { categories = []; }
  refreshCatSelects();
}

// ── 分類：更新所有下拉選單 ────────────────────────────────
function refreshCatSelects() {
  // 商品表單下拉
  const sel = document.getElementById('p-cat');
  const current = sel.value;
  sel.innerHTML = '<option value="">— 請選擇分類 —</option>' +
    categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (current) sel.value = current;

  // 篩選下拉
  const filter = document.getElementById('filter-cat');
  const fCurrent = filter.value;
  filter.innerHTML = '<option value="">所有分類</option>' +
    categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  if (fCurrent) filter.value = fCurrent;
}

// ── 分類：儲存到 Firestore ────────────────────────────────
async function saveCategories() {
  await db.collection('settings').doc('categories').set({ items: categories });
}

// ── 分類 Modal ────────────────────────────────────────────
function openCatModal() {
  renderCatList();
  document.getElementById('cat-modal').style.display = 'flex';
}
function closeCatModal() {
  document.getElementById('cat-modal').style.display = 'none';
}

function renderCatList() {
  const area = document.getElementById('cat-list-area');
  if (!categories.length) {
    area.innerHTML = '<p style="color:var(--muted);font-size:.88rem;text-align:center;padding:1rem">尚無分類，請新增</p>';
    return;
  }
  area.innerHTML = categories.map((c, i) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem .75rem;background:#f8fafc;border-radius:8px;border:1px solid var(--border)">
      <span style="font-size:.9rem;font-weight:500">${escapeHtml(c)}</span>
      <button onclick="deleteCategory(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:.2rem .5rem;border-radius:4px;transition:color .15s"
        onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--muted)'">✕ 刪除</button>
    </div>`).join('');
}

async function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) return;
  if (categories.includes(name)) {
    input.style.borderColor = 'var(--danger)';
    setTimeout(() => input.style.borderColor = '', 1500);
    return;
  }
  categories.push(name);
  input.value = '';
  await saveCategories();
  refreshCatSelects();
  renderCatList();
}

async function deleteCategory(idx) {
  categories.splice(idx, 1);
  await saveCategories();
  refreshCatSelects();
  renderCatList();
}
let uploadedImageUrl = ''; // 已上傳的圖片 URL

// ── 圖片壓縮 → base64（Canvas API，無需外部套件或 Storage）──
async function compressToBase64(file, maxKB = 150) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        // 最大邊長 1000px
        const MAX_DIM = 1000;
        if (width > MAX_DIM || height > MAX_DIM) {
          if (width > height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
          else { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
        }
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        // 逐步降低品質直到 base64 < maxKB
        let quality = 0.85;
        let dataUrl;
        do {
          dataUrl = canvas.toDataURL('image/jpeg', quality);
          quality = Math.max(0.05, quality - 0.1);
        } while (dataUrl.length * 0.75 / 1024 > maxKB && quality > 0.05);
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 使用者選擇檔案後觸發 ───────────────────────────────────
async function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const zone = document.getElementById('upload-zone');
  const progress = document.getElementById('upload-progress');
  const status = document.getElementById('upload-status');
  const preview = document.getElementById('img-preview');
  const placeholder = document.getElementById('upload-placeholder');
  const sizeInfo = document.getElementById('img-size-info');

  placeholder.style.display = 'none';
  progress.style.display = 'block';
  preview.style.display = 'none';
  sizeInfo.style.display = 'none';
  zone.style.borderColor = 'var(--primary)';

  try {
    const origKB = (file.size / 1024).toFixed(0);
    status.textContent = `壓縮中... (原始 ${origKB}KB)`;
    const dataUrl = await compressToBase64(file, 150);
    const finalKB = (dataUrl.length * 0.75 / 1024).toFixed(0);

    uploadedImageUrl = dataUrl;
    document.getElementById('p-img').value = ''; // base64 不顯示在 URL 欄
    preview.src = dataUrl;
    preview.style.display = 'block';
    progress.style.display = 'none';
    sizeInfo.textContent = `✅ 壓縮完成：${origKB}KB → ${finalKB}KB`;
    sizeInfo.style.display = 'block';
    zone.style.borderColor = 'var(--success)';
  } catch(e) {
    progress.style.display = 'none';
    placeholder.style.display = 'block';
    zone.style.borderColor = 'var(--danger)';
    document.getElementById('modal-alert').innerHTML = `<div class="alert alert-error">圖片處理失敗：${escapeHtml(e.message)}</div>`;
  }
}

// ── 貼網址時預覽 ────────────────────────────────────────────
function previewUrl(url) {
  const preview = document.getElementById('img-preview');
  const placeholder = document.getElementById('upload-placeholder');
  if (url && /^https:\/\//i.test(url)) {
    preview.src = url;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    uploadedImageUrl = url;
  } else {
    preview.style.display = 'none';
    placeholder.style.display = 'block';
    uploadedImageUrl = '';
  }
}

auth.onAuthStateChanged(async user => {
  if (!user) return window.location.href = '../index.html';
  const doc = await db.collection('admins').doc(user.uid).get();
  if (!doc.exists) return window.location.href = '../shop.html';
  await loadCategories();
  loadProducts();
});

async function loadProducts() {
  const snap = await db.collection('products').get();
  products = snap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => (b.createdAt?.seconds ?? 0) - (a.createdAt?.seconds ?? 0));
  // 分類選項
  const cats = [...new Set(products.map(p=>p.category).filter(Boolean))];
  const sel = document.getElementById('filter-cat');
  const dl = document.getElementById('cat-list');
  cats.forEach(c => {
    sel.innerHTML += `<option value="${c}">${c}</option>`;
    dl.innerHTML += `<option value="${c}">`;
  });
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const status = document.getElementById('filter-status').value;
  const filtered = products.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false;
    if (cat && p.category !== cat) return false;
    if (status === 'active' && !p.active) return false;
    if (status === 'inactive' && p.active) return false;
    return true;
  });
  const tbody = document.getElementById('product-tbody');
  tbody.innerHTML = filtered.length ? filtered.map(p => {
    const imgSrc = safeImgSrc(p.imageUrl);
    return `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:.6rem">
          <div style="width:38px;height:38px;border-radius:6px;background:#f1f5f9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;overflow:hidden">
            ${imgSrc ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:cover">` : '📦'}
          </div>
          <span style="font-weight:600">${escapeHtml(p.name)}</span>
        </div>
      </td>
      <td>${escapeHtml(p.category || '—')}</td>
      <td>
        ${p.salePrice ? `<span style="color:var(--danger);font-weight:700">${formatPrice(p.salePrice)}</span> <span style="text-decoration:line-through;color:var(--muted);font-size:.8rem">${formatPrice(p.price)}</span>` : formatPrice(p.price)}
      </td>
      <td><span class="badge ${(p.stock??999)<=0?'badge-danger':(p.stock??999)<10?'badge-warn':'badge-success'}">${(p.stock??999)<=0?'售完':escapeHtml(String(p.stock??'∞'))}</span></td>
      <td><span class="badge ${p.active?'badge-success':'badge-gray'}">${p.active?'上架中':'已下架'}</span></td>
      <td>
        <button class="btn btn-outline btn-sm" data-pid="${escapeHtml(p.id)}" onclick="editProduct(this.dataset.pid)">編輯</button>
        <button class="btn btn-sm" data-pid="${escapeHtml(p.id)}" data-active="${!p.active}" onclick="toggleActive(this.dataset.pid, this.dataset.active==='true')" style="margin-left:.4rem;color:${p.active?'var(--danger)':'var(--success)'};border:1.5px solid currentColor;border-radius:8px;padding:.35rem .8rem;font-size:.8rem;font-weight:600;background:none;cursor:pointer">
          ${p.active?'下架':'上架'}
        </button>
      </td>
    </tr>`;}).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--muted)">找不到商品</td></tr>';
}

function resetImageUI() {
  uploadedImageUrl = '';
  document.getElementById('p-img').value = '';
  document.getElementById('p-img-file').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-preview').src = '';
  document.getElementById('upload-placeholder').style.display = 'block';
  document.getElementById('upload-progress').style.display = 'none';
  document.getElementById('img-size-info').style.display = 'none';
  document.getElementById('upload-zone').style.borderColor = 'var(--border)';
}

function openModal(id) {
  editId = null;
  document.getElementById('modal-title').textContent = '新增商品';
  ['p-name','p-price','p-sale','p-stock','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-cat').value = '';
  document.getElementById('p-active').value = 'true';
  document.getElementById('modal-alert').innerHTML = '';
  resetImageUI();
  document.getElementById('product-modal').style.display = 'flex';
}

function editProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('modal-title').textContent = '編輯商品';
  document.getElementById('p-name').value = p.name || '';
  document.getElementById('p-cat').value = p.category || '';
  document.getElementById('p-price').value = p.price || '';
  document.getElementById('p-sale').value = p.salePrice || '';
  document.getElementById('p-stock').value = p.stock ?? '';
  document.getElementById('p-desc').value = p.description || '';
  document.getElementById('p-active').value = p.active ? 'true' : 'false';
  document.getElementById('modal-alert').innerHTML = '';
  resetImageUI();
  // 若已有圖片則顯示預覽
  if (p.imageUrl) {
    uploadedImageUrl = p.imageUrl;
    document.getElementById('p-img').value = p.imageUrl;
    const prev = document.getElementById('img-preview');
    prev.src = p.imageUrl;
    prev.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
  }
  document.getElementById('product-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

async function saveProduct() {
  const name = document.getElementById('p-name').value.trim();
  const price = parseFloat(document.getElementById('p-price').value);
  const stock = parseInt(document.getElementById('p-stock').value);
  const alertEl = document.getElementById('modal-alert');
  if (!name) { alertEl.innerHTML = '<div class="alert alert-error">請填寫商品名稱</div>'; return; }
  if (isNaN(price)) { alertEl.innerHTML = '<div class="alert alert-error">請填寫原價</div>'; return; }
  if (isNaN(stock)) { alertEl.innerHTML = '<div class="alert alert-error">請填寫庫存數量</div>'; return; }
  const saleVal = document.getElementById('p-sale').value;
  const data = {
    name,
    category: document.getElementById('p-cat').value.trim(),
    price,
    salePrice: saleVal ? parseFloat(saleVal) : null,
    stock,
    imageUrl: uploadedImageUrl || document.getElementById('p-img').value.trim(),
    description: document.getElementById('p-desc').value.trim(),
    active: document.getElementById('p-active').value === 'true',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '儲存中...';
  try {
    if (editId) {
      await db.collection('products').doc(editId).update(data);
      const idx = products.findIndex(p=>p.id===editId);
      if (idx>-1) products[idx] = { ...products[idx], ...data };
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('products').add(data);
      products.unshift({ id: ref.id, ...data });
    }
    renderTable();
    closeModal();
  } catch(e) {
    alertEl.innerHTML = `<div class="alert alert-error">儲存失敗：${e.message}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '儲存商品';
  }
}

async function toggleActive(id, active) {
  await db.collection('products').doc(id).update({ active });
  const idx = products.findIndex(p=>p.id===id);
  if (idx>-1) products[idx].active = active;
  renderTable();
}

function doLogout() { auth.signOut().then(() => window.location.href = '../index.html'); }
</script>
</body>
</html>
